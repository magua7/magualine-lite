services:
  gateway:
    build: .
    container_name: magualine-gateway
    restart: unless-stopped
    command: python -m app.gateway
    env_file:
      - .env
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
    ports:
      - "80:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin:
    build: .
    container_name: magualine-admin
    restart: unless-stopped
    command: python -m app.admin
    env_file:
      - .env
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
    ports:
      - "9443:9443"
    depends_on:
      - gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
